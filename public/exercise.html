<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("fitness-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }
      } catch (error) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="stylesheet" href="style.css" />
  <title>Fitness Tracker</title>
</head>

<body>
  <nav class="top-nav">
    <a class="brand-link" href="/" aria-label="Fitness Tracker home">
      <img class="brand-logo" src="/logo.svg" alt="" />
      <span class="brand-name">Fitness Tracker</span>
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/stats">Dashboard</a>
    </div>
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle color mode"></button>
  </nav>

  <div class="wrapper exercise">
    <header>
      <h1>Fitness Tracker</h1>
    </header>
    <div class="container exercise">
      <div class="card m-auto">
        <h2>Add Your Exercise</h2>
        <form action="POST">
          <div class="workout-type">
            <label for="type">Exercise Type:</label>
            <div class="neuro-select" data-neuro-select>
              <select name="type" id="type" data-neuro-native>
                <option disabled selected>Select Exercise Type</option>
                <option value="resistance">Resistance</option>
                <option value="cardio">Cardio</option>
              </select>
            </div>
          </div>
          <div class="cardio-form d-none">
            <div class="cardio-name">
              <label for="cardio-name">Name:</label>
              <input type="text" name="cardio-name" id="cardio-name" placeholder="Running" />
            </div>
            <div class="distance">
              <label for="distance">Distance (miles):</label>
              <input type="number" name="distance" id="distance" placeholder="5" />
            </div>
            <div class="duration">
              <label for="duration">Duration (minutes):</label>
              <input type="number" name="duration" id="duration" placeholder="10" />
            </div>
          </div>
          <div class="resistance-form d-none">
            <div class="exercise-name">
              <label for="name">Exercise Name:</label>
              <input type="text" name="name" id="name" placeholder="Bench Press" />
            </div>
            <div class="weight">
              <label for="weight">Weight (lbs):</label>
              <input type="number" name="weight" id="weight" placeholder="200" />
            </div>
            <div class="sets">
              <label for="sets">Sets:</label>
              <input type="number" name="sets" id="sets" placeholder="4" />
            </div>
            <div class="reps">
              <label for="reps">Reps:</label>
              <input type="number" name="reps" id="reps" placeholder="10" />
            </div>
            <div class="resistance-duration">
              <label for="resistance-duration">Duration (minutes):</label>
              <input type="number" name="resistance-duration" id="resistance-duration" placeholder="10" />
            </div>
          </div>
          <div class="buttons">
            <button type="button" disabled class="complete">Complete</button>
            <button type="button" disabled class="add-another">Add Exercise</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="toast">
    Workout Added Successfully!
  </div>

  <script src="/theme.js"></script>
  <script src="/custom-select.js"></script>
  <script src="/api.js"></script>
  <script src="/exercise.js"></script>
</body>

</html>
