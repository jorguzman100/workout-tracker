<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("fitness-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }
      } catch (error) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="stylesheet" href="style.css" />
  <title>Fitness Tracker</title>
</head>

<body>
  <nav class="top-nav">
    <a class="brand-link" href="/" aria-label="Fitness Tracker home">
      <img class="brand-logo" src="/logo.svg" alt="" />
      <span class="brand-name">Fitness Tracker</span>
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/exercise">Add Exercise</a>
      <a class="nav-link" href="/stats">Dashboard</a>
    </div>
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle color mode"></button>
  </nav>

  <div class="wrapper workout">
    <header>
      <h1>Fitness Tracker</h1>
    </header>

    <div class="container workout">
      <div class="card m-auto">
        <div class="prev-workout">
          <h3>Last Workout</h3>
          <div>
            <div class="workout-stats"></div>
            <div class="buttons">
              <a id="continue-btn" href="/exercise?">Continue Workout</a>
              <a href="/exercise">New Workout</a>
            </div>
          </div>
        </div>
        <div class="new-workout">
          <h3>Create Your First Workout</h3>
        </div>
      </div>
    </div>
  </div>

  <div id="toast">
    Workout Added Successfully!
  </div>

  <script src="/theme.js"></script>
  <script src="/api.js"></script>
  <script src="/workout.js"></script>
  <script src="/index.js"></script>
</body>

</html>
